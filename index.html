<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolSafe</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #222;
            text-align: center;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2d8a5a;
        }

        p {
            margin: 15px 0;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #2d8a5a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #256f49;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SchoolSafe</h1>

        <p>
            SchoolSafe è un gioco educativo in cui devi gestire la sicurezza di una scuola.
        </p>

        <p>
            Progetta le uscite di emergenza, organizza le aule e osserva cosa succede durante una simulazione di evacuazione.
        </p>

        <p>
            Le tue scelte influenzeranno la sicurezza degli studenti!
        </p>

        <a href="schoolsafe.html" class="btn">Vai al gioco</a>
    </div>

</body>
</html>
